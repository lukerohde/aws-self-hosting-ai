name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "posts/**"
      - "public/**"
      - "package.json"
      - "astro.config.mjs"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

# Stack names below are set by /setup — search for PULUMI_ORG/GITHUB_OWNER to find them.

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: ${{ secrets.PULUMI_ACCESS_TOKEN != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: pulumi/setup-pulumi@v2

      - name: Get config from Pulumi
        id: config
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          pulumi login
          echo "DEPLOY_ROLE_ARN=$(pulumi stack output deploy_role_arn -s PULUMI_ORG/GITHUB_OWNER-ingress/prod)" >> $GITHUB_OUTPUT
          echo "SITE_BUCKET=$(pulumi stack output portfolio_bucket -s PULUMI_ORG/GITHUB_OWNER-site/prod)" >> $GITHUB_OUTPUT
          echo "CF_DISTRIBUTION_ID=$(pulumi stack output portfolio_distribution_id -s PULUMI_ORG/GITHUB_OWNER-site/prod)" >> $GITHUB_OUTPUT
          echo "AWS_REGION=$(pulumi stack output aws_region -s PULUMI_ORG/GITHUB_OWNER-site/prod)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.config.outputs.DEPLOY_ROLE_ARN }}
          aws-region: ${{ steps.config.outputs.AWS_REGION }}

      - name: Install dependencies
        run: make install

      - name: Build & deploy
        env:
          SITE_BUCKET: ${{ steps.config.outputs.SITE_BUCKET }}
          CF_DISTRIBUTION_ID: ${{ steps.config.outputs.CF_DISTRIBUTION_ID }}
        run: make deploy
